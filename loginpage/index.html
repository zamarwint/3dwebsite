<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img class="image-gradient" src="../gradient.png" alt="gradient" />
    <div class="layer-blur"></div>

    <div class="container">
      <form action="#">
        <h1>Log in</h1>
        <div class="input-box">
          <input type="email" id="username" placeholder="Username" required />
          <img src="bx-user.svg" alt="User icon" />
        </div>
        <div class="input-box">
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
          <img src="bx-lock.svg" alt="Lock icon" />
        </div>
        <div class="remember-forgot">
          <label for="check"
            ><input type="checkbox" id="check" /> Remember me</label
          >
          <a href="#" class="forgot">Forgot Password</a>
        </div>
        <div>
          <button class="login" type="submit">Log in</button>
        </div>
        <div class="register">
          <p>Don't have an account? <a href="#">Register</a></p>
        </div>
      </form>
    </div>
  </body>
</html>
