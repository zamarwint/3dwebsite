<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLOCK</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="clock.png" type="image/x-icon" />
    <script src="script.js" async defer></script>
  </head>
  <body>
    <h1 class="text">YOUR FAVOURITE CLOCK!</h1>
    <div class="container">
      <h2 class="title title1">HOURS</h2>
      <h2 class="title title2">MINUTES</h2>
      <h2 class="title title3">SECONDS</h2>
      <div class="box box1"><h1 id="number1">00</h1></div>
      <div class="box box2"><h1 id="number2">00</h1></div>
      <div class="box box3"><h1 id="number3">00</h1></div>
    </div>
    <div class="info">
      <h3 id="meridian">ARMY TIME |</h3>
    </div>
